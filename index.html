<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Metadados do documento -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Página de redes sociais com ícones interativos">
  <meta name="theme-color" content="#2563eb">
  
  <!-- Título da página -->
  <title>Redes Sociais</title>
  
  <!-- Link para o arquivo CSS de estilos -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Container principal da página -->
  <main class="page-shell">
    <!-- Cabeçalho com título e descrição -->
    <header>
      <h1>Redes Sociais</h1>
      <p>Ícones com quadro transparente e botão embaixo de cada um.</p>
    </header>

    <!-- Grid de cards com ícones das redes sociais -->
    <section class="social-grid">
      
      <!-- Card do Instagram -->
      <article class="social-card">
        <div class="icon-box">
          <!-- Imagem do ícone do Instagram -->
          <img src="icons/instagram.svg" alt="Instagram">
          <!-- Texto abaixo do ícone -->
          <span class="icon-caption">loren</span>
        </div>
        <!-- Botão clicável que direciona para o Instagram -->
        <a class="social-button" href="https://www.instagram.com" target="_blank" rel="noopener noreferrer">Instagram</a>
      </article>

      <!-- Card do Twitter -->
      <article class="social-card">
        <div class="icon-box">
          <!-- Imagem do ícone do Twitter -->
          <img src="icons/twitter.svg" alt="Twitter">
          <!-- Texto abaixo do ícone -->
          <span class="icon-caption">loren</span>
        </div>
        <!-- Botão clicável que direciona para o Twitter -->
        <a class="social-button" href="https://www.twitter.com" target="_blank" rel="noopener noreferrer">Twitter</a>
      </article>

      <!-- Card do YouTube -->
      <article class="social-card">
        <div class="icon-box">
          <!-- Imagem do ícone do YouTube -->
          <img src="icons/youtube.svg" alt="YouTube">
          <!-- Texto abaixo do ícone -->
          <span class="icon-caption">loren</span>
        </div>
        <!-- Botão clicável que direciona para o YouTube -->
        <a class="social-button" href="https://www.youtube.com" target="_blank" rel="noopener noreferrer">YouTube</a>
      </article>
    </section>
  </main>
</body>
</html>
